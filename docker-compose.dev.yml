services:
  db:
    image: postgres:16-alpine
    container_name: booking-system-db
    environment:
      POSTGRES_DB: booking_system
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking_password
    ports:
      - "5432:5432"
    volumes:
      - booking_pg_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking_system"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: golang:1.23-alpine
    container_name: booking-system-api
    working_dir: /app
    volumes:
      - ./backend:/app
      - go_modules:/go/pkg/mod
    environment:
      APP_ENV: development
      GIN_MODE: debug
      PORT: 8080
      DATABASE_URL: postgres://booking:booking_password@db:5432/booking_system?sslmode=disable
      JWT_SECRET: change-me-to-a-production-secret-with-32-characters
      CORS_ORIGINS: http://localhost:3001
    ports:
      - "8080:8080"
    command: sh -c "go install github.com/air-verse/air@v1.52.3 && air --build.cmd 'go build -o tmp/main ./cmd/api' --build.bin './tmp/main'"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    container_name: booking-system-web
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node_modules_vol:/app/node_modules
      - next_cache_vol:/app/.next
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3001:3000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  booking_pg_data:
  go_modules:
  node_modules_vol:
  next_cache_vol:
